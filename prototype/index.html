<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AS ONE - サッカークラブ管理システム</title>
<style>
/* ===== リセット・基本 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #1a56db;
  --primary-dark: #1241ab;
  --primary-light: #e8f0fe;
  --secondary: #0ea5e9;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #6366f1;
  --dark: #1e293b;
  --gray-900: #0f172a;
  --gray-800: #1e293b;
  --gray-700: #334155;
  --gray-600: #475569;
  --gray-500: #64748b;
  --gray-400: #94a3b8;
  --gray-300: #cbd5e1;
  --gray-200: #e2e8f0;
  --gray-100: #f1f5f9;
  --gray-50:  #f8fafc;
  --white: #ffffff;
  --sidebar-width: 250px;
  --header-height: 60px;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
  --transition: .2s ease;
}
html, body { height: 100%; font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif; font-size: 14px; color: var(--gray-800); background: var(--gray-50); }

/* ===== ユーティリティ ===== */
.hidden { display: none !important; }
.screen { display: none; }
.screen.active { display: flex; }
.text-muted { color: var(--gray-500); }
.text-success { color: var(--success); }
.text-danger { color: var(--danger); }
.text-warning { color: var(--warning); }
.text-primary { color: var(--primary); }

/* ===== ボタン ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius); border: none;
  font-size: 14px; font-weight: 500; cursor: pointer; transition: all var(--transition);
  text-decoration: none; white-space: nowrap;
}
.btn:hover { opacity: .9; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary  { background: var(--primary); color: #fff; }
.btn-success  { background: var(--success); color: #fff; }
.btn-danger   { background: var(--danger);  color: #fff; }
.btn-warning  { background: var(--warning); color: #fff; }
.btn-outline  { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
.btn-outline:hover { background: var(--gray-100); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-full { width: 100%; }

/* ===== フォーム ===== */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--gray-700); font-size: 13px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--gray-300);
  border-radius: var(--radius); font-size: 14px; color: var(--gray-800);
  background: var(--white); transition: border-color var(--transition);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(26,86,219,.15);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.error-msg { color: var(--danger); font-size: 13px; padding: 8px 12px; background: #fef2f2; border-radius: 6px; margin-bottom: 12px; }

/* ===== カード ===== */
.card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-200);
}
.card-header h3 { font-size: 15px; font-weight: 600; color: var(--gray-800); }

/* ===== バッジ ===== */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-primary  { background: var(--primary-light); color: var(--primary); }
.badge-success  { background: #dcfce7; color: #166534; }
.badge-warning  { background: #fef3c7; color: #92400e; }
.badge-danger   { background: #fee2e2; color: #991b1b; }
.badge-info     { background: #ede9fe; color: #4c1d95; }
.badge-gray     { background: var(--gray-100); color: var(--gray-600); }

/* ===== テーブル ===== */
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--gray-200); }
th { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; background: var(--gray-50); }
tr:hover td { background: var(--gray-50); }
td { color: var(--gray-700); font-size: 14px; }

/* ===== ログイン画面 ===== */
#login-screen {
  min-height: 100vh; width: 100%;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1a56db 100%);
  align-items: center; justify-content: center;
}
.login-container {
  background: var(--white); border-radius: 16px;
  padding: 48px 40px; width: 400px; max-width: 95vw;
  box-shadow: var(--shadow-lg);
}
.login-logo { text-align: center; margin-bottom: 32px; }
.logo-icon { font-size: 48px; margin-bottom: 8px; }
.login-logo h1 { font-size: 32px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
.login-subtitle { color: var(--gray-500); font-size: 13px; margin-top: 4px; }
.demo-accounts { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--gray-200); }
.demo-accounts p { font-size: 12px; color: var(--gray-500); margin-bottom: 8px; text-align: center; }
.demo-list { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.demo-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--primary);
  color: var(--primary); background: transparent; font-size: 12px; cursor: pointer;
  transition: all var(--transition);
}
.demo-btn:hover { background: var(--primary); color: var(--white); }

/* ===== アプリレイアウト ===== */
#app-screen { min-height: 100vh; width: 100%; }

#sidebar {
  width: var(--sidebar-width); min-height: 100vh; background: var(--gray-900);
  color: var(--white); display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; z-index: 100;
  transition: transform var(--transition);
}
#sidebar.collapsed { transform: translateX(-100%); }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: var(--header-height);
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
.sidebar-close { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 18px; display: none; }

#main-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section-label {
  padding: 16px 16px 6px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; color: var(--gray-500);
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; color: var(--gray-400); cursor: pointer;
  transition: all var(--transition); text-decoration: none;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--white); background: rgba(255,255,255,.07); }
.nav-item.active { color: var(--white); background: rgba(26,86,219,.3); border-left-color: var(--primary); }
.nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; }
.nav-item .nav-label { font-size: 13px; }

.sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.1); }
#user-info-sidebar { margin-bottom: 10px; }
.user-role-badge { font-size: 11px; color: var(--gray-400); }
.user-name-sidebar { font-size: 14px; font-weight: 600; color: var(--white); }

#main-wrapper {
  margin-left: var(--sidebar-width);
  min-height: 100vh; display: flex; flex-direction: column;
  transition: margin-left var(--transition);
}
#main-wrapper.full { margin-left: 0; }

#app-header {
  height: var(--header-height); background: var(--white);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
  box-shadow: var(--shadow); position: sticky; top: 0; z-index: 50;
}
.menu-toggle { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-600); }
#page-title { flex: 1; font-size: 16px; font-weight: 600; color: var(--gray-800); }
#header-user { display: flex; align-items: center; gap: 8px; }
.header-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--primary); color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px;
}

#content-area { flex: 1; padding: 24px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; }
.overlay.active { display: block; }

/* ===== ダッシュボード ===== */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.stat-card {
  background: var(--white); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
}
.stat-icon {
  width: 48px; height: 48px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.stat-icon.blue   { background: var(--primary-light); }
.stat-icon.green  { background: #dcfce7; }
.stat-icon.orange { background: #fef3c7; }
.stat-icon.purple { background: #ede9fe; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--gray-800); }
.stat-label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

/* ===== 選手評価 ===== */
.evaluation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.player-eval-card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
.player-eval-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.player-avatar {
  width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white;
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px;
}
.eval-bars { display: flex; flex-direction: column; gap: 10px; }
.eval-bar-item { display: flex; align-items: center; gap: 10px; }
.eval-bar-label { width: 30px; font-size: 12px; font-weight: 600; color: var(--gray-600); flex-shrink: 0; }
.eval-bar-track { flex: 1; height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
.eval-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
.eval-bar-score { width: 28px; font-size: 12px; font-weight: 600; color: var(--gray-700); text-align: right; flex-shrink: 0; }

/* ===== 週報 ===== */
.weekly-report-list { display: flex; flex-direction: column; gap: 12px; }
.report-item {
  background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200);
  padding: 16px; cursor: pointer; transition: box-shadow var(--transition);
}
.report-item:hover { box-shadow: var(--shadow-md); }
.report-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.report-title { font-weight: 600; font-size: 14px; color: var(--gray-800); }
.report-content { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

/* ===== チェックリスト ===== */
.check-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: 6px; margin-bottom: 4px; cursor: pointer; transition: background var(--transition);
}
.check-item:hover { background: var(--gray-100); }
.check-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
.check-item.done span { text-decoration: line-through; color: var(--gray-400); }
.check-item span { font-size: 13px; color: var(--gray-700); }

/* ===== モーダル ===== */
.modal-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--white); border-radius: 12px; width: 540px;
  max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--gray-200);
  position: sticky; top: 0; background: var(--white); z-index: 1;
}
.modal-header h3 { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-500); }
.modal-close:hover { color: var(--gray-800); }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; justify-content: flex-end; gap: 10px; }

/* ===== ページヘッダー ===== */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.page-header h2 { font-size: 20px; font-weight: 700; color: var(--gray-800); }

/* ===== アバター ===== */
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; }
.avatar-sm { width: 28px; height: 28px; font-size: 11px; }
.bg-blue   { background: var(--primary); }
.bg-green  { background: var(--success); }
.bg-orange { background: var(--warning); }
.bg-purple { background: var(--info); }

/* ===== レスポンシブ ===== */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  .sidebar-close { display: block; }
  #main-wrapper { margin-left: 0; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  #content-area { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .evaluation-grid { grid-template-columns: 1fr; }
}

/* ===== チャット ===== */
.chat-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0; height: calc(100vh - 130px); background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.chat-sidebar { background: var(--gray-50); border-right: 1px solid var(--gray-200); overflow-y: auto; }
.chat-sidebar-header { padding: 14px 16px; font-size: 11px; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--gray-200); }
.chat-player-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--gray-200); transition: background var(--transition); }
.chat-player-item:hover, .chat-player-item.active { background: var(--primary-light); }
.chat-player-item.active .chat-player-name { color: var(--primary); font-weight: 600; }
.chat-player-name { font-size: 13px; color: var(--gray-800); font-weight: 500; }
.chat-player-sub { font-size: 11px; color: var(--gray-500); }
.chat-unread { margin-left: auto; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
.chat-main { display: flex; flex-direction: column; min-height: 0; }
.chat-header { padding: 14px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.chat-header-name { font-size: 15px; font-weight: 700; }
.chat-header-sub { font-size: 12px; color: var(--gray-500); }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { display: flex; gap: 10px; max-width: 78%; }
.chat-msg.self { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.chat-msg-avatar.ai { background: var(--info); }
.chat-msg-avatar.coach { background: var(--success); }
.chat-msg-avatar.parent { background: var(--warning); }
.chat-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
.chat-msg:not(.self) .chat-bubble { background: var(--gray-100); color: var(--gray-800); border-top-left-radius: 4px; }
.chat-msg.self .chat-bubble { background: var(--primary); color: white; border-top-right-radius: 4px; }
.chat-msg-meta { font-size: 11px; color: var(--gray-400); margin-top: 4px; }
.chat-msg.self .chat-msg-meta { text-align: right; }
.chat-input-area { padding: 14px 20px; border-top: 1px solid var(--gray-200); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
.chat-input { flex: 1; padding: 10px 16px; border: 1px solid var(--gray-300); border-radius: 24px; font-size: 14px; outline: none; resize: none; font-family: inherit; }
.chat-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.12); }
.chat-send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background var(--transition); }
.chat-send-btn:hover { background: var(--primary-dark); }
.chat-empty { display: flex; align-items: center; justify-content: center; flex: 1; flex-direction: column; gap: 10px; color: var(--gray-400); }

/* ===== 選手詳細 ===== */
.player-detail-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
.player-detail-profile { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.player-detail-cover { height: 72px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
.player-detail-avatar-wrap { padding: 0 20px; margin-top: -28px; margin-bottom: 10px; }
.player-detail-avatar { width: 56px; height: 56px; border-radius: 50%; background: white; border: 3px solid white; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--primary); box-shadow: var(--shadow); }
.player-detail-info { padding: 0 20px 18px; }
.player-detail-name { font-size: 18px; font-weight: 700; color: var(--gray-800); }
.player-detail-pos { font-size: 13px; color: var(--gray-500); margin-bottom: 10px; }
.player-info-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
.player-info-label { color: var(--gray-500); }
.player-info-val { font-weight: 500; color: var(--gray-800); }

/* ===== 評価履歴 ===== */
.eval-history-item { padding: 10px 12px; background: var(--gray-50); border-radius: 8px; margin-bottom: 8px; }
.eval-history-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.eval-history-date { font-size: 11px; color: var(--gray-400); }
.eval-history-scores { display: flex; gap: 6px; flex-wrap: wrap; }
.eval-score-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.eval-score-chip.heart { background: #fee2e2; color: #991b1b; }
.eval-score-chip.head  { background: #ede9fe; color: #4c1d95; }
.eval-score-chip.tech  { background: #fef3c7; color: #92400e; }
.eval-score-chip.body  { background: #dcfce7; color: #166534; }

/* ===== タグ・コメント ===== */
.report-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.tag { display: inline-flex; padding: 2px 10px; border-radius: 12px; font-size: 11px; background: var(--primary-light); color: var(--primary); font-weight: 600; }
.report-comments { margin-top: 16px; border-top: 1px solid var(--gray-200); padding-top: 12px; }
.comment-item { display: flex; gap: 10px; margin-bottom: 12px; }
.comment-body { flex: 1; background: var(--gray-50); border-radius: 8px; padding: 10px 14px; }
.comment-author { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.comment-text { font-size: 13px; color: var(--gray-700); margin-top: 2px; line-height: 1.5; }
.comment-time { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
.comment-input-row { display: flex; gap: 8px; margin-top: 10px; }
.comment-input-row input { flex: 1; padding: 8px 14px; border: 1px solid var(--gray-300); border-radius: 20px; font-size: 13px; outline: none; }
.comment-input-row input:focus { border-color: var(--primary); }

/* ===== 評価ロールタブ ===== */
.eval-role-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.eval-role-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--gray-300); font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--gray-600); transition: all .15s; }
.eval-role-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

@media (max-width: 768px) {
  .chat-layout { grid-template-columns: 1fr; height: auto; }
  .chat-sidebar { max-height: 180px; }
  .player-detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon">&#x26BD;</div>
        <h1>AS ONE</h1>

// ===== ログイン =====
function setupLoginForm() {
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();
    const id = document.getElementById('login-id').value.trim();
    const pw = document.getElementById('login-password').value;
    const user = USERS.find(u => u.id === id && u.password === pw);
    if (user) { login(user); }
    else { showLoginError('IDまたはパスワードが正しくありません'); }
  });
  document.querySelectorAll('.demo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('login-id').value = btn.dataset.id;
      document.getElementById('login-password').value = btn.dataset.pw;
    });
  });
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

function login(user) {
  currentUser = user;
  localStorage.setItem('asone_user', JSON.stringify(user));
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  buildNav();
  renderHeaderUser();
  navigateTo('dashboard');
}

function logout() {
  currentUser = null;
  localStorage.removeItem('asone_user');
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('login-id').value = '';
  document.getElementById('login-password').value = '';
}

// ===== サイドバー =====
function setupSidebar() {
  document.getElementById('menu-toggle').addEventListener('click', toggleSidebar);
  document.getElementById('sidebar-close').addEventListener('click', closeSidebar);
  document.getElementById('overlay').addEventListener('click', closeSidebar);
  document.getElementById('logout-btn').addEventListener('click', logout);
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 768) {
    sb.classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
  } else {
    sb.classList.toggle('collapsed');
    document.getElementById('main-wrapper').classList.toggle('full');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
}

function buildNav() {
  const menus = NAV_MENUS[currentUser.role] || NAV_MENUS.admin;
  document.getElementById('main-nav').innerHTML = menus.map(item => {
    if (item.section) return '<div class="nav-section-label">' + item.section + '</div>';
    return '<div class="nav-item" data-page="' + item.id + '" onclick="navigateTo(\'' + item.id + '\')">'
      + '<span class="nav-icon">' + item.icon + '</span>'
      + '<span class="nav-label">' + item.label + '</span>'
      + '</div>';
  }).join('');
  document.getElementById('user-info-sidebar').innerHTML =
    '<div class="user-role-badge">' + currentUser.roleLabel + '</div>'
    + '<div class="user-name-sidebar">' + currentUser.name + '</div>';
}

function renderHeaderUser() {
  const colors = { admin: 'bg-blue', coach: 'bg-green', player: 'bg-orange', parent: 'bg-purple' };
  document.getElementById('header-user').innerHTML =
    '<div class="header-avatar ' + colors[currentUser.role] + '">' + currentUser.name.charAt(0) + '</div>';
}

// ===== ナビゲーション =====
function navigateTo(page) {
  currentPage = page;
  closeSidebar();
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const allMenus = Object.values(NAV_MENUS).flat();
  const menuItem = allMenus.find(m => m.id === page);
  document.getElementById('page-title').textContent = menuItem ? menuItem.label : page;
  const area = document.getElementById('content-area');
  switch (page) {
    case 'dashboard':     area.innerHTML = renderDashboard();     break;
    case 'players':       area.innerHTML = renderPlayers();       break;
    case 'player-detail': area.innerHTML = renderPlayerDetail();  break;
    case 'staff':         area.innerHTML = renderStaff();         break;
    case 'evaluation':    area.innerHTML = renderEvaluation();    break;
    case 'reports':       area.innerHTML = renderReports();       break;
    case 'checklist':     area.innerHTML = renderChecklist();     break;
    case 'notices':       area.innerHTML = renderNotices();       break;
    case 'chat':          area.innerHTML = renderChat();
      setTimeout(() => {
        const a = document.getElementById('chat-messages-area');
        if (a) a.scrollTop = a.scrollHeight;
      }, 0);
      break;
    default: area.innerHTML = '<p>ページが見つかりません</p>';
  }
}

  editingEvalId = id;
  const p = PLAYERS.find(pl => pl.id === id);
  if (!p) return;
  document.getElementById('eval-modal-title').textContent = p.name + ' の評価編集';
  ['heart','head','tech','body'].forEach(k => {
    const el = document.getElementById('ev-' + k);
    const valEl = document.getElementById('ev-' + k + '-val');
    if (el) { el.value = p.evaluation[k]; valEl.textContent = p.evaluation[k]; }
  });
  openModal('eval-modal');
}

function saveEval() {
  const p = PLAYERS.find(pl => pl.id === editingEvalId);
  if (!p) return;
  ['heart','head','tech','body'].forEach(k => {
    const el = document.getElementById('ev-' + k);
    if (el) p.evaluation[k] = parseInt(el.value);
  });
  const commentEl = document.getElementById('ev-comment');
  if (!EVAL_HISTORY[p.id]) EVAL_HISTORY[p.id] = [];
  EVAL_HISTORY[p.id].unshift({
    date: new Date().toISOString().slice(0,10),
    evaluator: currentUser.role, evaluatorName: currentUser.name,
    heart: p.evaluation.heart, head: p.evaluation.head,
    tech: p.evaluation.tech, body: p.evaluation.body,
    comment: commentEl ? commentEl.value : ''
  });
  closeModal('eval-modal');
  if (currentPage === 'player-detail') {
    document.getElementById('content-area').innerHTML = renderPlayerDetail();
  } else {
    navigateTo('evaluation');
  }
}

        + '<div class="avatar avatar-sm bg-blue">' + c.author.charAt(0) + '</div>'
        + '<div class="comment-body">'
        + '<div class="comment-author">' + c.author + ' <span style="font-weight:400;color:var(--gray-400)">' + c.role + '</span></div>'
        + '<div class="comment-text">' + c.content + '</div>'
        + '<div class="comment-time">' + c.timestamp + '</div>'
        + '</div></div>'
      ).join('') : '<p style="font-size:13px;color:var(--gray-400);margin-bottom:8px">まだコメントはありません</p>')
    + '<div class="comment-input-row">'
    + '<input type="text" id="comment-input" placeholder="コメントを入力..." onkeydown="if(event.key===\'Enter\')addReportComment(' + r.id + ')">'
    + '<button class="btn btn-primary btn-sm" onclick="addReportComment(' + r.id + ')">送信</button>'
    + '</div>'
    + '</div>'
    + '</div>';
  document.getElementById('report-modal-footer').innerHTML =
    '<button class="btn btn-outline" onclick="closeModal(\'report-modal\')">閉じる</button>'
    + (canEdit && r.status==='draft' ? '<button class="btn btn-success" onclick="publishReport(' + r.id + ')">公開する</button>' : '');
  openModal('report-modal');
}

function addReportComment(reportId) {
  const input = document.getElementById('comment-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  const r = WEEKLY_REPORTS.find(rep => rep.id === reportId);
  if (!r) return;
  if (!r.comments) r.comments = [];
  const now = new Date();
  const ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0')
    + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  r.comments.push({ id: r.comments.length+1, author: currentUser.name, role: currentUser.roleLabel, content, timestamp: ts });
  openReportDetail(reportId);
}

function publishReport(id) {
  const r = WEEKLY_REPORTS.find(rep => rep.id === id);
  if (r) r.status = 'published';
  closeModal('report-modal');
  navigateTo('reports');
}

function openReportModal() {
  document.getElementById('report-modal-title').textContent = '週報作成';
  document.getElementById('report-modal-body').innerHTML =
    '<div class="form-row">'
    + '<div class="form-group"><label>週ラベル</label><input type="text" id="r-week" placeholder="2026年第15週"></div>'
    + '<div class="form-group"><label>練習日数</label><input type="number" id="r-days" placeholder="4"></div></div>'
    + '<div class="form-row">'
    + '<div class="form-group"><label>開始日</label><input type="date" id="r-start"></div>'
    + '<div class="form-group"><label>終了日</label><input type="date" id="r-end"></div></div>'
    + '<div class="form-group"><label>練習内容</label><input type="text" id="r-practice" placeholder="ポジショニング練習"></div>'
    + '<div class="form-group"><label>試合</label><input type="text" id="r-match" placeholder="vs FC〇〇（○3-1）"></div>'
    + '<div class="form-group"><label>良かった点</label><textarea id="r-good" rows="2"></textarea></div>'
    + '<div class="form-group"><label>課題・改善点</label><textarea id="r-improve" rows="2"></textarea></div>'
    + '<div class="form-group"><label>来週の計画</label><textarea id="r-next" rows="2"></textarea></div>';
  document.getElementById('report-modal-footer').innerHTML =
    '<button class="btn btn-outline" onclick="closeModal(\'report-modal\')">キャンセル</button>'
    + '<button class="btn btn-warning" onclick="saveReport(\'draft\')">下書き保存</button>'
    + '<button class="btn btn-primary" onclick="saveReport(\'published\')">公開する</button>';
  openModal('report-modal');
}

function saveReport(status) {
  const week = document.getElementById('r-week') && document.getElementById('r-week').value.trim();
  if (!week) { alert('週ラベルを入力してください'); return; }
  WEEKLY_REPORTS.unshift({
    id: WEEKLY_REPORTS.length + 1,
    weekLabel: week,
    startDate: document.getElementById('r-start').value || '',
    endDate:   document.getElementById('r-end').value || '',
    author: currentUser.name, authorRole: currentUser.role,
    trainingDays:   parseInt(document.getElementById('r-days').value) || 0,
    practiceContent: document.getElementById('r-practice').value || '',
    match:           document.getElementById('r-match').value || '',
    goodPoints:      document.getElementById('r-good').value || '',
    improvements:    document.getElementById('r-improve').value || '',
    nextWeekPlan:    document.getElementById('r-next').value || '',
    status
  });
  closeModal('report-modal');
  navigateTo('reports');
}

// ===== チェックリスト =====
function renderChecklist() {
  const groups = [
    { key: 'daily',   label: '日次チェック', icon: '&#x2600;&#xFE0F;' },
    { key: 'weekly',  label: '週次チェック', icon: '&#x1F4C5;' },
    { key: 'monthly', label: '月次チェック', icon: '&#x1F4C6;' },
  ];
  return '<div class="page-header"><h2>業務チェックリスト</h2></div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px">'
    + groups.map(g => {
        const items = checklistState[g.key];
        const done = items.filter(c => c.done).length;
        return '<div class="card">'
          + '<div class="card-header"><h3>' + g.icon + ' ' + g.label + '</h3>'
          + '<span class="badge badge-primary">' + done + '/' + items.length + '</span></div>'
          + '<div style="height:6px;background:var(--gray-200);border-radius:3px;margin-bottom:12px">'
          + '<div style="height:100%;background:var(--success);width:' + (items.length ? Math.round(done/items.length*100) : 0) + '%;border-radius:3px;transition:width .4s"></div></div>'
          + items.map(c =>
              '<div class="check-item' + (c.done?' done':'') + '" onclick="toggleCheck(\'' + g.key + '\',\'' + c.id + '\')">'
              + '<input type="checkbox"' + (c.done?' checked':'') + ' onclick="event.stopPropagation();toggleCheck(\'' + g.key + '\',\'' + c.id + '\')">'
              + '<span>' + c.label + '</span></div>'
            ).join('')
          + '</div>';
      }).join('')
    + '</div>';
}

function toggleCheck(group, id) {
  const item = checklistState[group].find(c => c.id === id);
  if (item) { item.done = !item.done; navigateTo('checklist'); }
}

// ===== お知らせ =====
function renderNotices() {
  const canEdit = currentUser.role === 'admin';
  return '<div class="page-header"><h2>お知らせ</h2>'
    + (canEdit ? '<button class="btn btn-primary" onclick="openNoticeModal()">+ お知らせ作成</button>' : '')
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:12px">'
    + NOTIFICATIONS.map(n =>
        '<div class="card" style="border-left:4px solid ' + (n.important ? 'var(--danger)' : 'var(--primary)') + '">'
        + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        + (n.important ? '<span class="badge badge-danger">重要</span>' : '<span class="badge badge-primary">お知らせ</span>')
        + '<span style="font-weight:700;font-size:15px">' + n.title + '</span>'
        + '<span class="text-muted" style="font-size:12px;margin-left:auto">' + n.date + '</span>'
        + '</div><p style="font-size:14px;color:var(--gray-700)">' + n.content + '</p></div>'
      ).join('')
    + '</div>'
    + '<div id="notice-modal" class="modal-backdrop"><div class="modal">'
    + '<div class="modal-header"><h3>お知らせ作成</h3>'
    + '<button class="modal-close" onclick="closeModal(\'notice-modal\')">&#x2715;</button></div>'
    + '<div class="modal-body">'
    + '<div class="form-group"><label>タイトル</label><input type="text" id="n-title" placeholder="タイトルを入力"></div>'
    + '<div class="form-group"><label>内容</label><textarea id="n-content" rows="4" placeholder="内容を入力"></textarea></div>'
    + '<div class="form-group"><label><input type="checkbox" id="n-important" style="margin-right:6px">重要なお知らせとして登録</label></div>'
    + '</div><div class="modal-footer">'
    + '<button class="btn btn-outline" onclick="closeModal(\'notice-modal\')">キャンセル</button>'
    + '<button class="btn btn-primary" onclick="saveNotice()">投稿する</button>'
    + '</div></div></div>';
}

function openNoticeModal() { openModal('notice-modal'); }

function saveNotice() {
  const titleEl = document.getElementById('n-title');
  const title = titleEl && titleEl.value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  NOTIFICATIONS.unshift({
    id: NOTIFICATIONS.length + 1, type: 'general', title,
    content:   document.getElementById('n-content').value || '',
    date:      new Date().toISOString().slice(0,10),
    important: document.getElementById('n-important').checked || false
  });
  closeModal('notice-modal');
  navigateTo('notices');
}

// ===== モーダル共通 =====
function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-backdrop')) {
    e.target.classList.remove('active');
  }
});

// ===== AIチャット =====
let currentChatPlayerId = null;

function renderChat() {
  let chatPlayers = PLAYERS;
  if (currentUser.role === 'player') {
    chatPlayers = PLAYERS.filter(p => p.name === currentUser.name);
  } else if (currentUser.role === 'parent') {
    chatPlayers = PLAYERS.filter(p => p.parentName === currentUser.name);
  }
  if (!currentChatPlayerId && chatPlayers.length > 0) currentChatPlayerId = chatPlayers[0].id;

  const selected = PLAYERS.find(p => p.id === currentChatPlayerId);
  const messages = (selected && CHAT_MESSAGES[selected.id]) || [];

  const sidebarHtml = chatPlayers.map(p => {
    const msgs = CHAT_MESSAGES[p.id] || [];
    const unread = msgs.filter(m => !m.read && m.senderName !== currentUser.name).length;
    return '<div class="chat-player-item' + (p.id === currentChatPlayerId ? ' active' : '') + '" onclick="selectChatPlayer(' + p.id + ')">'
      + '<div class="avatar avatar-sm bg-blue">' + p.name.charAt(0) + '</div>'
      + '<div><div class="chat-player-name">' + p.name + '</div>'
      + '<div class="chat-player-sub">' + p.position + ' / ' + p.grade + '</div></div>'
      + (unread > 0 ? '<div class="chat-unread">' + unread + '</div>' : '')
      + '</div>';
  }).join('');

  const mainHtml = selected
    ? '<div class="chat-header">'
      + '<div class="avatar bg-blue">' + selected.name.charAt(0) + '</div>'
      + '<div><div class="chat-header-name">' + selected.name + '</div>'
      + '<div class="chat-header-sub">' + selected.position + ' / ' + selected.grade + ' / 保護者：' + selected.parentName + '</div></div>'
      + '<span class="badge badge-info" style="margin-left:auto">AIコーチ対応中</span>'
      + '</div>'
      + '<div class="chat-messages" id="chat-messages-area">' + buildChatMsgHtml(messages) + '</div>'
      + '<div class="chat-input-area">'
      + '<textarea class="chat-input" id="chat-input" placeholder="メッセージを入力..." rows="1"'
      + ' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChatMessage();}"></textarea>'
      + '<button class="chat-send-btn" onclick="sendChatMessage()">&#x27A4;</button>'
      + '</div>'
    : '<div class="chat-empty"><p>選手を選択してください</p></div>';

  return '<div class="chat-layout">'
    + '<div class="chat-sidebar"><div class="chat-sidebar-header">選手一覧</div>' + sidebarHtml + '</div>'
    + '<div class="chat-main">' + mainHtml + '</div>'
    + '</div>';
}

function buildChatMsgHtml(msgs) {
  return msgs.map(m => {
    const isSelf = m.senderName === currentUser.name;
    return '<div class="chat-msg' + (isSelf ? ' self' : '') + '">'
      + '<div class="chat-msg-avatar ' + m.sender + '">' + m.senderName.charAt(0) + '</div>'
      + '<div><div class="chat-bubble">' + m.content + '</div>'
      + '<div class="chat-msg-meta">' + m.senderName + ' · ' + m.timestamp + '</div>'
      + '</div></div>';
  }).join('');
}

function selectChatPlayer(id) {
  currentChatPlayerId = id;
  navigateTo('chat');
}

function sendChatMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const content = input.value.trim();
  if (!content || !currentChatPlayerId) return;
  if (!CHAT_MESSAGES[currentChatPlayerId]) CHAT_MESSAGES[currentChatPlayerId] = [];
  const msgs = CHAT_MESSAGES[currentChatPlayerId];
  const now = new Date();
  const ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0')
    + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  msgs.push({ id: msgs.length+1, sender: currentUser.role, senderName: currentUser.name, content, timestamp: ts, read: true });
  input.value = '';
  refreshChatArea(msgs);

  const aiReplies = [
    'なるほど！その気づきはとても大切ですね。',
    'よく頑張っています！具体的に教えてもらえますか？',
    'コーチにも共有しておきますね。',
    'その課題は練習で改善できます。一緒に考えましょう。',
    'ありがとうございます。他に気になることはありますか？'
  ];
  setTimeout(() => {
    msgs.push({ id: msgs.length+1, sender: 'ai', senderName: 'AIコーチ',
      content: aiReplies[Math.floor(Math.random() * aiReplies.length)], timestamp: ts, read: true });
    refreshChatArea(msgs);
  }, 1200);
}

function refreshChatArea(msgs) {
  const area = document.getElementById('chat-messages-area');
  if (!area) return;
  area.innerHTML = buildChatMsgHtml(msgs);
  area.scrollTop = area.scrollHeight;
}

// ===== 選手詳細 =====
let currentDetailPlayerId = null;

function openPlayerDetail(id) {
  currentDetailPlayerId = id;
  navigateTo('player-detail');
}

function renderPlayerDetail() {
  const p = PLAYERS.find(pl => pl.id === currentDetailPlayerId);
  if (!p) return '<p>選手が見つかりません</p>';
  const history = EVAL_HISTORY[p.id] || [];
  const canEdit = ['admin','coach'].includes(currentUser.role);
  const chatPrev = (CHAT_MESSAGES[p.id] || []).slice(-3);

  return '<div class="page-header">'
    + '<button class="btn btn-outline btn-sm" onclick="navigateTo(\'players\')">&#x2190; 一覧に戻る</button>'
    + '<h2>' + p.name + '</h2>'
    + (canEdit ? '<button class="btn btn-primary btn-sm" onclick="openEvalModal(' + p.id + ')">評価を編集</button>' : '')
    + '</div>'
    + '<div class="player-detail-grid">'
    // 左：プロフィール＋評価バー
    + '<div>'
    + '<div class="player-detail-profile">'
    + '<div class="player-detail-cover"></div>'
    + '<div class="player-detail-avatar-wrap"><div class="player-detail-avatar">' + p.name.charAt(0) + '</div></div>'
    + '<div class="player-detail-info">'
    + '<div class="player-detail-name">' + p.name + '</div>'
    + '<div class="player-detail-pos">' + p.position + ' / ' + p.grade + '</div>'
    + [['背番号','#'+p.number],['年齢',p.age+'歳'],['身長',p.height+'cm'],['体重',p.weight+'kg'],['保護者',p.parentName],['入会日',p.joinDate]]
      .map(([l,v]) => '<div class="player-info-row"><span class="player-info-label">'+l+'</span><span class="player-info-val">'+v+'</span></div>').join('')
    + (p.notes ? '<div style="margin-top:10px;padding:10px;background:var(--gray-50);border-radius:6px;font-size:13px;color:var(--gray-600)">' + p.notes + '</div>' : '')
    + '</div></div>'
    + '<div class="card" style="margin-top:16px"><div class="card-header"><h3>現在の評価</h3></div>'
    + '<div class="eval-bars">'
    + [['心','heart','#ef4444'],['頭','head','#6366f1'],['技','tech','#f59e0b'],['体','body','#22c55e']].map(([l,k,c]) =>
        '<div class="eval-bar-item"><div class="eval-bar-label">'+l+'</div>'
        + '<div class="eval-bar-track"><div class="eval-bar-fill" style="width:'+p.evaluation[k]+'%;background:'+c+'"></div></div>'
        + '<div class="eval-bar-score">'+p.evaluation[k]+'</div></div>'
      ).join('')
    + '</div></div>'
    + '</div>'
    // 右：評価履歴＋チャット概要
    + '<div>'
    + '<div class="card"><div class="card-header"><h3>評価履歴</h3></div>'
    + '<div class="eval-role-tabs">'
    + [['all','すべて'],['coach','コーチ'],['self','本人'],['parent','保護者']].map(([f,l],i) =>
        '<button class="eval-role-tab'+(i===0?' active':'')+'" onclick="filterEvalHistory(this,\''+f+'\')">'+l+'</button>'
      ).join('')
    + '</div>'
    + '<div id="eval-history-list">' + buildEvalHistoryItems(history, 'all') + '</div>'
    + '</div>'
    + (chatPrev.length ? '<div class="card" style="margin-top:16px"><div class="card-header"><h3>最近のチャット</h3>'
      + '<button class="btn btn-sm btn-outline" onclick="selectChatPlayer('+p.id+');navigateTo(\'chat\')">チャットへ</button></div>'
      + chatPrev.map(m =>
          '<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--gray-100)">'
          + '<div class="avatar avatar-sm '+(m.sender==='ai'?'bg-purple':'bg-blue')+'">' + m.senderName.charAt(0) + '</div>'
          + '<div><div style="font-size:12px;font-weight:600;color:var(--gray-600)">'+m.senderName+'</div>'
          + '<div style="font-size:13px;color:var(--gray-700)">'+m.content+'</div></div></div>'
        ).join('')
      + '</div>' : '')
    + '</div>'
    + '</div>'
    // eval modal
    + '<div id="eval-modal" class="modal-backdrop"><div class="modal">'
    + '<div class="modal-header"><h3 id="eval-modal-title">評価編集</h3>'
    + '<button class="modal-close" onclick="closeModal(\'eval-modal\')">&#x2715;</button></div>'
    + '<div class="modal-body">'
    + [['心 (メンタル・態度)','ev-heart'],['頭 (戦術理解・判断)','ev-head'],['技 (テクニック)','ev-tech'],['体 (フィジカル)','ev-body']].map(([l,eid]) =>
        '<div class="form-group"><label>'+l+' <span id="'+eid+'-val" style="font-weight:700;color:var(--primary)">70</span></label>'
        + '<input type="range" id="'+eid+'" min="0" max="100" value="70" style="width:100%;accent-color:var(--primary)"'
        + ' oninput="document.getElementById(\''+eid+'-val\').textContent=this.value">'
        + '</div>'
      ).join('')
    + '<div class="form-group"><label>コメント（任意）</label><textarea id="ev-comment" rows="3" placeholder="評価の根拠や気づきを記入..."></textarea></div>'
    + '</div><div class="modal-footer">'
    + '<button class="btn btn-outline" onclick="closeModal(\'eval-modal\')">キャンセル</button>'
    + '<button class="btn btn-primary" onclick="saveEval()">保存</button>'
    + '</div></div></div>';
}

function buildEvalHistoryItems(history, filter) {
  const filtered = filter === 'all' ? history : history.filter(h => h.evaluator === filter);
  if (!filtered.length) return '<p style="color:var(--gray-400);font-size:13px;text-align:center;padding:20px">記録がありません</p>';
  return filtered.map(h =>
    '<div class="eval-history-item">'
    + '<div class="eval-history-header">'
    + '<div class="avatar avatar-sm '+(h.evaluator==='coach'?'bg-green':h.evaluator==='self'?'bg-orange':'bg-purple')+'">' + h.evaluatorName.charAt(0) + '</div>'
    + '<span style="font-size:13px;font-weight:600">'+h.evaluatorName+'</span>'
    + '<span class="eval-history-date">'+h.date+'</span>'
    + '</div>'
    + '<div class="eval-history-scores">'
    + '<span class="eval-score-chip heart">心 '+h.heart+'</span>'
    + '<span class="eval-score-chip head">頭 '+h.head+'</span>'
    + '<span class="eval-score-chip tech">技 '+h.tech+'</span>'
    + '<span class="eval-score-chip body">体 '+h.body+'</span>'
    + '</div>'
    + (h.comment ? '<p style="font-size:13px;color:var(--gray-600);margin-top:6px">'+h.comment+'</p>' : '')
    + '</div>'
  ).join('');
}

function filterEvalHistory(btn, filter) {
  document.querySelectorAll('.eval-role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const history = EVAL_HISTORY[currentDetailPlayerId] || [];
  document.getElementById('eval-history-list').innerHTML = buildEvalHistoryItems(history, filter);
}
